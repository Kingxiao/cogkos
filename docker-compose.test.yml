services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: cogkos
      POSTGRES_PASSWORD: cogkos_test
      POSTGRES_DB: cogkos_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogkos -d cogkos_test"]
      interval: 2s
      timeout: 3s
      retries: 10

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379"
    tmpfs:
      - /var/lib/falkordb/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
