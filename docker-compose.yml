# CogKOS development environment
# Ports: PG=5435, FalkorDB=6381, MCP=3000, Health=8081
# Offset ports avoid conflicts with locally installed PostgreSQL/Redis
# Usage: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cogkos-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: cogkos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cogkos_dev}
      POSTGRES_DB: cogkos
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogkos -d cogkos"]
      interval: 5s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    container_name: cogkos-falkordb
    restart: unless-stopped
    ports:
      - "6381:6379"
    environment:
      REDIS_ARGS: "--appendonly yes --appendfsync everysec --save 900 1 --save 300 10"
    volumes:
      - ./data/falkordb:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment to enable local BGE-M3 embedding via TEI (free, no API key needed)
  # tei:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
  #   container_name: cogkos-tei
  #   restart: unless-stopped
  #   ports:
  #     - "8090:80"
  #   volumes:
  #     - ./data/models:/data
  #   command: --model-id BAAI/bge-m3 --port 80 --max-client-batch-size 32
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:80/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 120s

  cogkos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cogkos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8081:8081"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: postgres://cogkos:${POSTGRES_PASSWORD:-cogkos_dev}@postgres:5432/cogkos
      FALKORDB_URL: redis://falkordb:6379
      FALKORDB_GRAPH: ${FALKORDB_GRAPH:-cogkos}
      MCP_HOST: 0.0.0.0
      MCP_PORT: "3000"
      MCP_TRANSPORT: http
      HEALTH_PORT: "8081"
      LOCAL_STORAGE_PATH: /app/data/objects
      # Auth — set DEFAULT_MCP_API_KEY for dev mode (bypasses DB key validation)
      DEFAULT_MCP_API_KEY: ${DEFAULT_MCP_API_KEY:-}
      DEFAULT_MCP_TENANT: ${DEFAULT_MCP_TENANT:-default}
      # Embedding — defaults to local BGE-M3 via TEI
      # If TEI runs in this compose: set EMBEDDING_BASE_URL=http://tei:80/v1
      # If TEI runs on host: use http://host.docker.internal:8090/v1
      API_302_KEY: ${API_302_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://localhost:8090/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      # LLM (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./data/objects:/app/data/objects
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
