# CogKOS 自用生产环境
# 端口: PG=5435, FalkorDB=6381, MCP=3000, Health=8081
# 启动: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cogkos-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: cogkos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cogkos_dev}
      POSTGRES_DB: cogkos
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogkos -d cogkos"]
      interval: 5s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    container_name: cogkos-falkordb
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - ./data/falkordb:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cogkos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cogkos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8081:8081"
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://cogkos:${POSTGRES_PASSWORD:-cogkos_dev}@postgres:5432/cogkos
      FALKORDB_URL: redis://falkordb:6379
      MCP_HOST: 0.0.0.0
      MCP_PORT: "3000"
      MCP_TRANSPORT: http
      HEALTH_PORT: "8081"
      # Embedding — set API_302_KEY in .env or environment
      API_302_KEY: ${API_302_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.302.ai/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
