# syntax=docker/dockerfile:1.7
# 使用BuildKit多平台构建 (2026年最佳实践)

# ====================
# 开发环境配置
# ====================
version: "3.9"

services:
  # PostgreSQL 17 + pgvector
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cogkos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cogkos
      POSTGRES_PASSWORD: cogkos_dev
      POSTGRES_DB: cogkos
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogkos -d cogkos"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cogkos-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # FalkorDB - Redis协议图数据库
  falkordb:
    image: falkordb/falkordb:latest
    container_name: cogkos-falkordb
    ports:
      - "6379:6379"
    volumes:
      - ./data/falkordb:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cogkos-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # SeaweedFS - S3兼容分布式对象存储（支持数十亿文件）
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: cogkos-seaweedfs
    ports:
      - "9333:9333"   # Master
      - "8080:8080"    # Volume
      - "8333:8333"    # S3 Gateway
      - "8888:8888"    # Filer
    command: "server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json -filer"
    volumes:
      - ./data/seaweedfs:/data
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cogkos-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # CogKOS应用服务
  cogkos:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: cogkos-app
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: info
      LOG_FORMAT: json
      DATABASE_URL: postgres://cogkos:cogkos_dev@postgres:5432/cogkos
      FALKORDB_URL: redis://falkordb:6379
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: cogkos
      S3_SECRET_KEY: cogkos_dev_secret_key
      S3_BUCKET: cogkos-docs
      S3_REGION: us-east-1
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3000
      HEALTH_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    networks:
      - cogkos-network
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # 初始化桶服务
  seaweedfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: cogkos
      AWS_SECRET_ACCESS_KEY: cogkos_dev_secret_key
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://cogkos-docs 2>/dev/null || true;
      echo 'Bucket cogkos-docs initialized';
      "
    networks:
      - cogkos-network

networks:
  cogkos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
