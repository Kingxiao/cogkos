apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogkos-staging

resources:
  - ../base

namePrefix: staging-

commonLabels:
  environment: staging

replicas:
  - name: cogkos-mcp
    count: 2

images:
  - name: cogkos/cogkos
    newTag: staging-latest
  - name: cogkos/cogkos-sleep
    newTag: staging-latest

configMapGenerator:
  - name: cogkos-config
    behavior: merge
    literals:
      - RUST_LOG=info

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: cogkos-mcp-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 10
