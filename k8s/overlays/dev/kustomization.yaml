apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogkos-dev

resources:
  - ../base

namePrefix: dev-

commonLabels:
  environment: dev

replicas:
  - name: cogkos-mcp
    count: 1

images:
  - name: cogkos/cogkos
    newTag: dev-latest
  - name: cogkos/cogkos-sleep
    newTag: dev-latest

configMapGenerator:
  - name: cogkos-config
    behavior: merge
    literals:
      - RUST_LOG=debug

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: cogkos-mcp-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: Deployment
      name: cogkos-mcp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
