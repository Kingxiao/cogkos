apiVersion: v1
kind: Secret
metadata:
  name: cogkos-secrets
type: Opaque
stringData:
  # 使用环境变量注入，不要在此文件写入真实密钥
  database-url: "postgres://cogkos:${DB_PASSWORD}@postgres:5432/cogkos"
  falkordb-url: "redis://falkordb:6379"
  qdrant-url: "http://qdrant:6334"
  s3-endpoint: "http://minio:9000"
  s3-access-key: "cogkos"
  s3-secret-key: "${S3_SECRET_KEY}"
