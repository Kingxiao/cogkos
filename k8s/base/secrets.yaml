apiVersion: v1
kind: Secret
metadata:
  name: cogkos-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace placeholder values before applying.
  # For production, use a secret manager (Vault, AWS Secrets Manager, etc.)
