apiVersion: batch/v1
kind: CronJob
metadata:
  name: cogkos-consolidation
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: cogkos
            component: sleep-task
        spec:
          serviceAccountName: cogkos-sa
          restartPolicy: OnFailure
          containers:
            - name: consolidator
              image: cogkos/cogkos-sleep:v0.1.0
              command: ["/app/cogkos-sleep", "consolidate"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: cogkos-secrets
                      key: database-url
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cogkos-decay
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: cogkos-sa
          restartPolicy: OnFailure
          containers:
            - name: decay
              image: cogkos/cogkos-sleep:v0.1.0
              command: ["/app/cogkos-sleep", "decay"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: cogkos-secrets
                      key: database-url
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
