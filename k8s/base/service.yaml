apiVersion: v1
kind: Service
metadata:
  name: cogkos-mcp
  labels:
    app: cogkos
    component: mcp
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: cogkos
    component: mcp
