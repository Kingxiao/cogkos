# 默认values - 生产环境配置
# 使用Helm 3.16+特性

# =========================
# 全局配置
# =========================
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# =========================
# CogKOS MCP Server
# =========================
mcp:
  enabled: true
  replicaCount: 3
  
  image:
    repository: cogkos/cogkos
    pullPolicy: IfNotPresent
    tag: "v0.1.0"
  
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""
  
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
  
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  service:
    type: ClusterIP
    port: 3000
    metricsPort: 9090
  
  ingress:
    enabled: false
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: cogkos.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  # HPA v2配置
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    metrics:
      - type: Pods
        pods:
          metric:
            name: http_requests_per_second
          target:
            type: AverageValue
            averageValue: "1000"
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
  
  # Pod Disruption Budget
  pdb:
    enabled: true
    minAvailable: 2
  
  # 节点亲和性
  nodeSelector: {}
  
  tolerations: []
  
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: cogkos
            topologyKey: kubernetes.io/hostname
  
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: cogkos

# =========================
# Sleep-time任务
# =========================
sleep:
  enabled: true
  
  image:
    repository: cogkos/cogkos-sleep
    pullPolicy: IfNotPresent
    tag: "v0.1.0"
  
  # 定时任务配置
  consolidation:
    enabled: true
    schedule: "0 */6 * * *"
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 1000m
  
  decay:
    enabled: true
    schedule: "0 2 * * *"
    resources:
      requests:
        memory: 128Mi
        cpu: 100m

# =========================
# 应用配置
# =========================
config:
  server:
    host: "0.0.0.0"
    port: 3000
    maxConnections: 10000
    requestTimeoutSecs: 30
  
  cache:
    enabled: true
    ttlSeconds: 3600
    maxEntries: 10000
  
  evolution:
    conflictDetectionEnabled: true
    decayIntervalHours: 24
    consolidationIntervalHours: 6
  
  activation:
    sampleRate: 1.0
    batchFlushIntervalMs: 5000
    batchMaxSize: 1000

# =========================
# 外部依赖配置
# =========================
externalDependencies:
  postgres:
    enabled: true
    host: "postgres"
    port: 5432
    database: "cogkos"
    username: "cogkos"
    password: ""
    existingSecret: ""
    existingSecretKey: ""
  
  falkordb:
    enabled: true
    host: "falkordb"
    port: 6379
  
  s3:
    enabled: true
    endpoint: "http://minio:9000"
    bucket: "cogkos-docs"
    region: "us-east-1"
    accessKey: ""
    secretKey: ""
    existingSecret: ""

# =========================
# 可观测性
# =========================
observability:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
      namespace: ""
      interval: 15s
      scrapeTimeout: 10s
  
  tracing:
    enabled: false
    jaeger:
      endpoint: "http://jaeger:4317"
  
  logging:
    level: info
    format: json

# =========================
# 网络安全
# =========================
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
