{{- if not .Values.externalDependencies.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cogkos.fullname" . }}-secrets
  labels:
    {{- include "cogkos.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "cogkos.databaseUrl" . | quote }}
  falkordb-url: "redis://{{ .Values.externalDependencies.falkordb.host }}:{{ .Values.externalDependencies.falkordb.port }}"
  s3-endpoint: {{ .Values.externalDependencies.s3.endpoint | quote }}
  s3-access-key: {{ .Values.externalDependencies.s3.accessKey | quote }}
  s3-secret-key: {{ .Values.externalDependencies.s3.secretKey | quote }}
{{- end }}
