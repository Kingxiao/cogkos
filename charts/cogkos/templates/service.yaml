apiVersion: v1
kind: Service
metadata:
  name: {{ include "cogkos.fullname" . }}-mcp
  labels:
    {{- include "cogkos.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.mcp.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "cogkos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
