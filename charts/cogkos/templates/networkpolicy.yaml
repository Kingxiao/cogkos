{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cogkos.fullname" . }}-network-policy
  labels:
    {{- include "cogkos.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cogkos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
